<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <div class="top">
            <div class="logo">R</div>

            <div>
                <h1>Crear cuenta</h1>
                <p>Accede a todos los recursos del curso</p>
            </div>
        </div>

        <form>

            <label>Nombre completo</label>
            <input type="text" placeholder="Ej. Ana García López">

            <label>Correo electrónico</label>
            <input type="email" placeholder="nombre@ejemplo.com">

            <div class="passwords">

                <div>
                    <label>Contraseña</label>
                    <input type="password" placeholder="********">
                </div>

                <div>
                    <label>Confirmar</label>
                    <input type="password" placeholder="********">
                </div>

            </div>

            <label>Nivel</label>

            <div class="niveles">
                <button type="button" class="activo">Principiante</button>
                <button type="button">Intermedio</button>
                <button type="button">Avanzado</button>
            </div>

            <button class="crear">
                Crear mi cuenta
            </button>

        </form>

        <p class="login">
            ¿Ya tienes cuenta?
            <a href="#">Inicia sesión aquí</a>
        </p>

    </div>

</body>
</html>
